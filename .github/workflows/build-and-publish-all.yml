name: "Build and Publish Slurm for Each Supported OS"

on:
  workflow_dispatch:
    inputs:
      toolchain_versions:
        description: 'Toolchain versions to use (comma-separated, e.g., "jammy,noble,resolute,rockylinux8,rockylinux9,rockylinux10" or "all")'
        required: true
        default: 'all'
        type: string
      architectures:
        description: 'CPU architectures to build (comma-separated, e.g., "amd64,arm64" or "all")'
        required: true
        default: 'all'
        type: string

env:
  S3_BUCKET: slurm-factory-spack-buildcache-4b670
  CLOUDFRONT_URL: https://slurm-factory-spack-binary-cache.vantagecompute.ai

jobs:
  prepare-matrix:
    runs-on: ubuntu-24.04
    timeout-minutes: 3600
    outputs:
      toolchain_matrix: ${{ steps.set-matrix.outputs.toolchain_matrix }}
      architecture_matrix: ${{ steps.set-matrix.outputs.architecture_matrix }}
    steps:
      - name: Prepare version matrices
        timeout-minutes: 360
        id: set-matrix
        run: |
          # Prepare toolchain versions matrix
          if [ "${{ inputs.toolchain_versions }}" = "all" ]; then
            TOOLCHAINS='["resolute", "noble", "jammy", "rockylinux10", "rockylinux9", "rockylinux8"]'
          else
            IFS=',' read -ra VERS <<< "${{ inputs.toolchain_versions }}"
            TOOLCHAINS="["
            for v in "${VERS[@]}"; do
              v=$(echo "$v" | xargs)
              TOOLCHAINS="${TOOLCHAINS}\"${v}\","
            done
            TOOLCHAINS="${TOOLCHAINS%,}]"
          fi
          echo "toolchain_matrix=${TOOLCHAINS}" >> $GITHUB_OUTPUT
          echo "Building with toolchains: ${TOOLCHAINS}"

          # Prepare architecture matrix
          if [ "${{ inputs.architectures }}" = "all" ]; then
            ARCHITECTURES='["amd64", "arm64"]'
          else
            IFS=',' read -ra ARCHS <<< "${{ inputs.architectures }}"
            ARCHITECTURES="["
            for a in "${ARCHS[@]}"; do
              a=$(echo "$a" | xargs)
              if [ "$a" != "amd64" ] && [ "$a" != "arm64" ]; then
                echo "Error: unsupported architecture '$a'. Supported values: amd64, arm64"
                exit 1
              fi
              ARCHITECTURES="${ARCHITECTURES}\"${a}\","
            done
            ARCHITECTURES="${ARCHITECTURES%,}]"
          fi
          echo "architecture_matrix=${ARCHITECTURES}" >> $GITHUB_OUTPUT
          echo "Building for architectures: ${ARCHITECTURES}"

  build-and-publish-slurm:
    needs: prepare-matrix
    runs-on: ${{ fromJSON(matrix.architecture == 'arm64' && '["self-hosted","ARM64"]' || '["self-hosted","X64"]') }}
    timeout-minutes: 3600
    environment: release
    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        toolchain: ${{ fromJson(needs.prepare-matrix.outputs.toolchain_matrix) }}
        architecture: ${{ fromJson(needs.prepare-matrix.outputs.architecture_matrix) }}

    steps:
      - name: Checkout
        timeout-minutes: 360
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        timeout-minutes: 360
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: "Set up Python"
        timeout-minutes: 360
        run: uv python install 3.12

      - name: Clean previous builds
        timeout-minutes: 360
        run: |
          # Clean up any previous builds for this version/compiler combo
          docker images | grep "slurm-factory:25.11-${{ matrix.toolchain }}" | awk '{print $3}' | xargs -r docker rmi -f || true

          # Clean Spack cache directories to prevent state leakage between runs
          # This ensures the buildcache test truly validates buildcache installation
          rm -rf "$HOME/.spack"

      - name: Configure AWS credentials
        timeout-minutes: 360
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-duration-seconds: 14400  # 4 hours for long-running builds

      - name: Validate GPG secrets
        timeout-minutes: 360
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "Error: GPG_PRIVATE_KEY secret is not set"
            exit 1
          fi
          if [ -z "$GPG_KEY_ID" ]; then
            echo "Error: GPG_KEY_ID secret is not set"
            exit 1
          fi
          echo "✓ GPG secrets are configured"
          echo "  GPG_KEY_ID: $GPG_KEY_ID"

      - name: Build Slurm and publish to buildcache
        timeout-minutes: 360
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "🔨 Building Slurm 25.11 with ${{ matrix.toolchain }} on architecture ${{ matrix.architecture }}..."
          if [ -z "$GPG_KEY_ID" ]; then
            echo "Error: GPG_KEY_ID is not set. Signed packages are required for publishing."
            exit 1
          fi
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "Error: GPG_PRIVATE_KEY is not set. Signed packages are required for publishing."
            exit 1
          fi
          if [ -z "$GPG_PASSPHRASE" ]; then
            echo "Error: GPG_PASSPHRASE is not set. Signed packages are required for publishing."
            exit 1
          fi
          echo "Using GPG signing key: $GPG_KEY_ID"
          uv run slurm-factory build-slurm \
            --slurm-version 25.11 \
            --toolchain ${{ matrix.toolchain }} \
            --gpu \
            --no-cache \
            --publish=all \
            --signing-key "$GPG_KEY_ID" \
            --gpg-private-key "$GPG_PRIVATE_KEY" \
            --gpg-passphrase "$GPG_PASSPHRASE"

          # Cleanup: Stop and remove all containers first, then remove images
          docker ps -aq | xargs -r docker stop || true
          docker ps -aq | xargs -r docker rm -f || true
          for i in `docker image list --format json | jq -r .ID`; do docker rmi $i -f; done
          docker buildx prune -f

      - name: Summary
        timeout-minutes: 360
        if: always()
        run: |
          echo "## Slurm Buildcache Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Slurm Version:** 25.11" >> $GITHUB_STEP_SUMMARY
          echo "**Toolchain:** ${{ matrix.toolchain }}" >> $GITHUB_STEP_SUMMARY
          echo "**Architecture:** ${{ matrix.architecture }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Buildcache Location:**" >> $GITHUB_STEP_SUMMARY
          echo "- S3: \`s3://${{ env.S3_BUCKET }}/${{ matrix.toolchain }}/slurm/25.11/\`" >> $GITHUB_STEP_SUMMARY
          echo "- CloudFront: ${{ env.CLOUDFRONT_URL }}/${{ matrix.toolchain }}/slurm/25.11/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Usage:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "spack mirror add slurm-factory-buildcache ${{ env.CLOUDFRONT_URL }}/${{ matrix.toolchain }}/slurm/25.11" >> $GITHUB_STEP_SUMMARY
          echo "spack buildcache keys --install --trust" >> $GITHUB_STEP_SUMMARY
          echo "spack install slurm" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ── Consolidate buildcache indexes ──────────────────────────────────
  # After all architecture matrix jobs complete, rebuild the spack
  # buildcache index for each toolchain's deps mirror to guarantee it
  # includes packages from all architectures.
  consolidate-buildcache-index:
    needs: [prepare-matrix, build-and-publish-slurm]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Install Spack
        run: |
          git clone --depth=1 --branch=v1.0.0 https://github.com/spack/spack.git ~/spack
          pip install --break-system-packages boto3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-duration-seconds: 3600

      - name: Rebuild buildcache indexes
        run: |
          . ~/spack/share/spack/setup-env.sh
          TOOLCHAINS='${{ needs.prepare-matrix.outputs.toolchain_matrix }}'

          for toolchain in $(echo "$TOOLCHAINS" | jq -r '.[]'); do
            MIRROR_URL="s3://${{ env.S3_BUCKET }}/${toolchain}/slurm/25.11"
            MIRROR_NAME="idx-${toolchain}-25.11"
            echo "==> Rebuilding index for ${MIRROR_URL}..."
            spack mirror add "${MIRROR_NAME}" "${MIRROR_URL}"
            spack buildcache update-index "${MIRROR_NAME}"
            spack mirror rm "${MIRROR_NAME}"
          done
          echo "✓ All buildcache indexes consolidated"

  summary:
    needs: [build-and-publish-slurm, consolidate-buildcache-index]
    runs-on: ubuntu-24.04
    timeout-minutes: 3600
    if: always()
    steps:
      - name: Build Summary
        timeout-minutes: 360
        run: |
          echo "## Overall Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All Slurm buildcaches have been built and published." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Slurm Versions:** 25.11" >> $GITHUB_STEP_SUMMARY
          echo "**Toolchain Versions:** ${{ inputs.toolchain_versions }}" >> $GITHUB_STEP_SUMMARY
          echo "**Architectures:** ${{ inputs.architectures }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**S3 Bucket:** \`s3://${{ env.S3_BUCKET }}/{toolchain}/slurm/25.11/\`" >> $GITHUB_STEP_SUMMARY
          echo "**CloudFront URL:** ${{ env.CLOUDFRONT_URL }}/{toolchain}/slurm/25.11/" >> $GITHUB_STEP_SUMMARY