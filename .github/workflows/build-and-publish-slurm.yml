name: "Build and Publish Slurm"

on:
  workflow_dispatch:
    inputs:
      slurm_versions:
        description: 'Slurm versions to build (comma-separated, e.g., "25.11,24.11" or "all")'
        required: true
        default: 'all'
        type: string
      toolchains:
        description: 'Toolchains to use (comma-separated, e.g., "resolute,noble,rockylinux10" or "all")'
        required: true
        default: 'all'
        type: string
      architectures:
        description: 'CPU architectures to build (comma-separated, e.g., "amd64,arm64" or "all")'
        required: true
        default: 'all'
        type: string
      use_slurm_buildcache:
        description: 'Use Slurm buildcache (download pre-built Slurm packages)'
        required: false
        default: false
        type: boolean
      use_deps_buildcache:
        description: 'Use dependencies buildcache (download pre-built dependencies)'
        required: false
        default: false
        type: boolean

env:
  S3_BUCKET: slurm-factory-spack-buildcache-4b670
  CLOUDFRONT_URL: https://slurm-factory-spack-binary-cache.vantagecompute.ai

jobs:
  prepare-matrix:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    outputs:
      slurm_matrix: ${{ steps.set-matrix.outputs.slurm_matrix }}
      toolchain_matrix: ${{ steps.set-matrix.outputs.toolchain_matrix }}
      architecture_matrix: ${{ steps.set-matrix.outputs.architecture_matrix }}
    steps:
      - name: Prepare version matrices
        timeout-minutes: 120
        id: set-matrix
        run: |
          # Prepare Slurm versions matrix
          if [ "${{ inputs.slurm_versions }}" = "all" ]; then
            SLURM_VERSIONS='["26.05", "25.11", "24.11", "23.11"]'
          else
            IFS=',' read -ra VERS <<< "${{ inputs.slurm_versions }}"
            SLURM_VERSIONS="["
            for v in "${VERS[@]}"; do
              v=$(echo "$v" | xargs)
              SLURM_VERSIONS="${SLURM_VERSIONS}\"${v}\","
            done
            SLURM_VERSIONS="${SLURM_VERSIONS%,}]"
          fi
          echo "slurm_matrix=${SLURM_VERSIONS}" >> $GITHUB_OUTPUT
          echo "Building Slurm versions: ${SLURM_VERSIONS}"

          # Prepare compiler versions matrix
          if [ "${{ inputs.toolchains }}" = "all" ]; then
            TOOLCHAINS='["resolute", "noble", "jammy", "rockylinux10", "rockylinux9", "rockylinux8"]'
          else
            IFS=',' read -ra VERS <<< "${{ inputs.toolchains }}"
            TOOLCHAINS="["
            for v in "${VERS[@]}"; do
              v=$(echo "$v" | xargs)
              TOOLCHAINS="${TOOLCHAINS}\"${v}\","
            done
            TOOLCHAINS="${TOOLCHAINS%,}]"
          fi
          echo "toolchain_matrix=${TOOLCHAINS}" >> $GITHUB_OUTPUT
          echo "Building with toolchains: ${TOOLCHAINS}"

          # Prepare architecture matrix
          if [ "${{ inputs.architectures }}" = "all" ]; then
            ARCHITECTURES='["amd64", "arm64"]'
          else
            IFS=',' read -ra ARCHS <<< "${{ inputs.architectures }}"
            ARCHITECTURES="["
            for a in "${ARCHS[@]}"; do
              a=$(echo "$a" | xargs)
              if [ "$a" != "amd64" ] && [ "$a" != "arm64" ]; then
                echo "Error: unsupported architecture '$a'. Supported values: amd64, arm64"
                exit 1
              fi
              ARCHITECTURES="${ARCHITECTURES}\"${a}\","
            done
            ARCHITECTURES="${ARCHITECTURES%,}]"
          fi
          echo "architecture_matrix=${ARCHITECTURES}" >> $GITHUB_OUTPUT
          echo "Building for architectures: ${ARCHITECTURES}"

  # ── Job 1: Build ─────────────────────────────────────────────────────
  # Compiles Slurm via Spack, pushes spack binary packages to buildcache,
  # and stages the redistributable tarball in S3 for downstream jobs.
  build-slurm:
    needs: prepare-matrix
    runs-on: ${{ matrix.architecture == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    timeout-minutes: 3600
    environment: release
    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        slurm_version: ${{ fromJson(needs.prepare-matrix.outputs.slurm_matrix) }}
        toolchain: ${{ fromJson(needs.prepare-matrix.outputs.toolchain_matrix) }}
        architecture: ${{ fromJson(needs.prepare-matrix.outputs.architecture_matrix) }}

    steps:
      - name: Checkout
        timeout-minutes: 120
        uses: actions/checkout@v5

      - name: Install uv
        timeout-minutes: 120
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Set up Python
        timeout-minutes: 120
        run: uv python install 3.12

      - name: Clean previous builds
        timeout-minutes: 120
        run: |
          docker images | grep "slurm-factory:${{ matrix.slurm_version }}-gcc${{ matrix.toolchain }}" | awk '{print $3}' | xargs -r docker rmi -f || true
          rm -rf "$HOME/.spack"

      - name: Configure AWS credentials
        timeout-minutes: 120
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-duration-seconds: 14400

      - name: Validate GPG secrets
        timeout-minutes: 120
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "Error: GPG_PRIVATE_KEY secret is not set"
            exit 1
          fi
          if [ -z "$GPG_KEY_ID" ]; then
            echo "Error: GPG_KEY_ID secret is not set"
            exit 1
          fi
          echo "✓ GPG secrets are configured"
          echo "  GPG_KEY_ID: $GPG_KEY_ID"

      - name: Build Slurm and push spack buildcache
        timeout-minutes: 360
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "🔨 Building Slurm ${{ matrix.slurm_version }} with toolchain ${{ matrix.toolchain }} on architecture ${{ matrix.architecture }}..."
          if [ -z "$GPG_KEY_ID" ]; then
            echo "Error: GPG_KEY_ID is not set. Signed packages are required for publishing."
            exit 1
          fi
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "Error: GPG_PRIVATE_KEY is not set. Signed packages are required for publishing."
            exit 1
          fi
          if [ -z "$GPG_PASSPHRASE" ]; then
            echo "Error: GPG_PASSPHRASE is not set. Signed packages are required for publishing."
            exit 1
          fi
          echo "Using GPG signing key: $GPG_KEY_ID"

          BUILDCACHE_OPT=""
          if [ "${{ inputs.use_slurm_buildcache }}" = "true" ] && [ "${{ inputs.use_deps_buildcache }}" = "true" ]; then
            BUILDCACHE_OPT="--buildcache=all"
            echo "Using buildcache: all (dependencies + Slurm)"
          elif [ "${{ inputs.use_slurm_buildcache }}" = "true" ]; then
            BUILDCACHE_OPT="--buildcache=slurm"
            echo "Using buildcache: slurm only"
          elif [ "${{ inputs.use_deps_buildcache }}" = "true" ]; then
            BUILDCACHE_OPT="--buildcache=deps"
            echo "Using buildcache: dependencies only"
          else
            echo "Not using buildcache (building from source)"
          fi

          # --publish=spack: push spack binary packages to buildcache but
          # skip tarball signing/upload (handled by publish-slurm job after testing)
          uv run slurm-factory build-slurm \
            --slurm-version ${{ matrix.slurm_version }} \
            --toolchain ${{ matrix.toolchain }} \
            --gpu \
            --no-cache \
            --publish=spack \
            --signing-key "$GPG_KEY_ID" \
            --gpg-private-key "$GPG_PRIVATE_KEY" \
            --gpg-passphrase "$GPG_PASSPHRASE" \
            $BUILDCACHE_OPT

          # Cleanup Docker resources
          docker ps -aq | xargs -r docker stop || true
          docker ps -aq | xargs -r docker rm -f || true
          for i in $(docker image list --format json | jq -r .ID); do docker rmi "$i" -f; done
          docker buildx prune -f

      - name: Summarize build diagnostics
        if: always()
        timeout-minutes: 5
        shell: bash
        run: |
          CACHE_ROOT="$HOME/.slurm-factory"
          STAGE_DIR="$CACHE_ROOT/spack-stage/${{ matrix.toolchain }}/${{ matrix.slurm_version }}"
          BUILD_DIR="$CACHE_ROOT/builds/${{ matrix.toolchain }}/${{ matrix.slurm_version }}"
          DEBUG_DIR="$CACHE_ROOT/build-debug/${{ matrix.toolchain }}/${{ matrix.slurm_version }}"

          echo "== ~/.slurm-factory directories =="
          find "$CACHE_ROOT" -maxdepth 4 -type d | sort || true
          echo
          echo "== Stage directory listing (${STAGE_DIR}) =="
          ls -la "$STAGE_DIR" || true
          echo
          echo "== Build output listing (${BUILD_DIR}) =="
          ls -la "$BUILD_DIR" || true
          echo
          echo "== Stable debug bundle listing (${DEBUG_DIR}) =="
          find "$DEBUG_DIR" -maxdepth 5 -type f | sort || true
          echo
          echo "== Discovered Spack log files =="
          find "$STAGE_DIR" -type f \( \
            -name 'spack-build-out.txt' -o \
            -name 'spack-build-env.txt' -o \
            -name 'config.log' \
          \) | sort || true

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics-${{ matrix.slurm_version }}-${{ matrix.toolchain }}-${{ matrix.architecture }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            /home/runner/.slurm-factory/spack-stage/${{ matrix.toolchain }}/${{ matrix.slurm_version }}/**/spack-build-out.txt
            /home/runner/.slurm-factory/spack-stage/${{ matrix.toolchain }}/${{ matrix.slurm_version }}/**/spack-build-env.txt
            /home/runner/.slurm-factory/spack-stage/${{ matrix.toolchain }}/${{ matrix.slurm_version }}/**/config.log
            /home/runner/.slurm-factory/builds/${{ matrix.toolchain }}/${{ matrix.slurm_version }}/**

      - name: Upload stable debug bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-bundle-${{ matrix.slurm_version }}-${{ matrix.toolchain }}-${{ matrix.architecture }}
          if-no-files-found: warn
          retention-days: 14
          path: /home/runner/.slurm-factory/build-debug/${{ matrix.toolchain }}/${{ matrix.slurm_version }}/**

      - name: Locate tarball
        timeout-minutes: 120
        id: tarball
        run: |
          TARBALL_DIR="$HOME/.slurm-factory/builds/${{ matrix.toolchain }}/${{ matrix.slurm_version }}"
          BASE_TARBALL_NAME="slurm-${{ matrix.slurm_version }}-${{ matrix.toolchain }}-software.tar.gz"
          ARCH_TARBALL_NAME="slurm-${{ matrix.slurm_version }}-${{ matrix.toolchain }}-${{ matrix.architecture }}-software.tar.gz"
          TARBALL_PATH="${TARBALL_DIR}/${BASE_TARBALL_NAME}"
          ARCH_TARBALL_PATH="${TARBALL_DIR}/${ARCH_TARBALL_NAME}"
          if [ ! -f "$TARBALL_PATH" ]; then
            echo "Error: tarball not found at $TARBALL_PATH"
            ls -la "$TARBALL_DIR" || true
            exit 1
          fi
          cp "$TARBALL_PATH" "$ARCH_TARBALL_PATH"
          echo "tarball_path=${ARCH_TARBALL_PATH}" >> $GITHUB_OUTPUT
          echo "tarball_name=${ARCH_TARBALL_NAME}" >> $GITHUB_OUTPUT
          echo "✓ Tarball found: $(du -h "$TARBALL_PATH" | cut -f1) at $TARBALL_PATH"

      - name: Stage tarball for downstream jobs
        timeout-minutes: 120
        run: |
          STAGING_KEY="github-actions-artifacts/${{ github.run_id }}/${{ github.run_attempt }}/slurm-tarball-${{ matrix.slurm_version }}-${{ matrix.toolchain }}-${{ matrix.architecture }}/${{ steps.tarball.outputs.tarball_name }}"
          echo "📤 Staging tarball at s3://${{ env.S3_BUCKET }}/${STAGING_KEY}"
          aws s3 cp \
            "${{ steps.tarball.outputs.tarball_path }}" \
            "s3://${{ env.S3_BUCKET }}/${STAGING_KEY}"
          echo "✓ Tarball staged for downstream jobs"

  # ── Job 2: Test ──────────────────────────────────────────────────────
  # Downloads the staged tarball and validates it in a Docker container
  # (module load, sinfo -V). Runs BEFORE publish so a test failure does
  # not leave a broken tarball in the production buildcache.
  test-slurm:
    needs: [prepare-matrix, build-slurm]
    runs-on: ${{ matrix.architecture == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    timeout-minutes: 180
    environment: release
    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        slurm_version: ${{ fromJson(needs.prepare-matrix.outputs.slurm_matrix) }}
        toolchain: ${{ fromJson(needs.prepare-matrix.outputs.toolchain_matrix) }}
        architecture: ${{ fromJson(needs.prepare-matrix.outputs.architecture_matrix) }}

    steps:
      - name: Checkout
        timeout-minutes: 120
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        timeout-minutes: 120
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-duration-seconds: 3600

      - name: Download staged tarball
        timeout-minutes: 120
        run: |
          mkdir -p /tmp/slurm-tarball
          TARBALL_NAME="slurm-${{ matrix.slurm_version }}-${{ matrix.toolchain }}-${{ matrix.architecture }}-software.tar.gz"
          STAGING_KEY="github-actions-artifacts/${{ github.run_id }}/${{ github.run_attempt }}/slurm-tarball-${{ matrix.slurm_version }}-${{ matrix.toolchain }}-${{ matrix.architecture }}/${TARBALL_NAME}"
          echo "📥 Downloading staged tarball from s3://${{ env.S3_BUCKET }}/${STAGING_KEY}"
          aws s3 cp \
            "s3://${{ env.S3_BUCKET }}/${STAGING_KEY}" \
            "/tmp/slurm-tarball/${TARBALL_NAME}"

      - name: Test Slurm tarball
        timeout-minutes: 120
        run: |
          TARBALL_NAME="slurm-${{ matrix.slurm_version }}-${{ matrix.toolchain }}-${{ matrix.architecture }}-software.tar.gz"
          TARBALL_PATH="/tmp/slurm-tarball/${TARBALL_NAME}"
          echo "🧪 Testing Slurm ${{ matrix.slurm_version }} tarball with toolchain ${{ matrix.toolchain }} on architecture ${{ matrix.architecture }}..."
          echo "   Tarball: $(du -h "$TARBALL_PATH" | cut -f1)"
          LOCAL_TARBALL_PATH="${TARBALL_PATH}" \
            SLURM_VERSION="${{ matrix.slurm_version }}" \
            TOOLCHAIN="${{ matrix.toolchain }}" \
            ./scripts/test-tarball.sh

      - name: Cleanup
        timeout-minutes: 120
        if: always()
        run: |
          docker rmi "slurm-tarball-test:${{ matrix.slurm_version }}-${{ matrix.toolchain }}" 2>/dev/null || true
          rm -rf /tmp/slurm-tarball

  # ── Job 3: Publish ───────────────────────────────────────────────────
  # GPG-signs the tarball and uploads tarball + detached signature to S3.
  # Only runs after test-slurm succeeds.
  publish-slurm:
    needs: [prepare-matrix, test-slurm]
    runs-on: ${{ matrix.architecture == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    timeout-minutes: 180
    environment: release
    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        slurm_version: ${{ fromJson(needs.prepare-matrix.outputs.slurm_matrix) }}
        toolchain: ${{ fromJson(needs.prepare-matrix.outputs.toolchain_matrix) }}
        architecture: ${{ fromJson(needs.prepare-matrix.outputs.architecture_matrix) }}

    steps:
      - name: Configure AWS credentials
        timeout-minutes: 120
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-duration-seconds: 3600

      - name: Download staged tarball
        timeout-minutes: 120
        run: |
          mkdir -p /tmp/slurm-publish
          TARBALL_NAME="slurm-${{ matrix.slurm_version }}-${{ matrix.toolchain }}-${{ matrix.architecture }}-software.tar.gz"
          STAGING_KEY="github-actions-artifacts/${{ github.run_id }}/${{ github.run_attempt }}/slurm-tarball-${{ matrix.slurm_version }}-${{ matrix.toolchain }}-${{ matrix.architecture }}/${TARBALL_NAME}"
          echo "📥 Downloading staged tarball from s3://${{ env.S3_BUCKET }}/${STAGING_KEY}"
          aws s3 cp \
            "s3://${{ env.S3_BUCKET }}/${STAGING_KEY}" \
            "/tmp/slurm-publish/${TARBALL_NAME}"

      - name: Sign and publish tarball to S3
        timeout-minutes: 120
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          TARBALL_NAME="slurm-${{ matrix.slurm_version }}-${{ matrix.toolchain }}-${{ matrix.architecture }}-software.tar.gz"
          TARBALL_PATH="/tmp/slurm-publish/${TARBALL_NAME}"
          S3_PATH="${{ matrix.toolchain }}/${{ matrix.slurm_version }}/${{ matrix.architecture }}"

          echo "📦 Publishing ${TARBALL_NAME}..."
          echo "   Size: $(du -h "$TARBALL_PATH" | cut -f1)"
          echo "   Destination: s3://${{ env.S3_BUCKET }}/${S3_PATH}/"

          # Import GPG key
          echo "$GPG_PRIVATE_KEY" | base64 -d | \
            gpg --batch --yes --passphrase "$GPG_PASSPHRASE" \
                --pinentry-mode loopback --import

          # Sign tarball
          echo "🔐 Signing tarball with GPG key ${GPG_KEY_ID}..."
          echo "$GPG_PASSPHRASE" | gpg --batch --yes --passphrase-fd 0 \
            --pinentry-mode loopback \
            --local-user "$GPG_KEY_ID" \
            --detach-sign \
            --armor \
            --output "${TARBALL_PATH}.asc" \
            "$TARBALL_PATH"
          echo "✓ Tarball signed"

          # Upload tarball and signature to S3
          echo "📤 Uploading tarball to S3..."
          aws s3 cp "$TARBALL_PATH" \
            "s3://${{ env.S3_BUCKET }}/${S3_PATH}/${TARBALL_NAME}"
          echo "✓ Tarball uploaded"

          echo "📤 Uploading signature to S3..."
          aws s3 cp "${TARBALL_PATH}.asc" \
            "s3://${{ env.S3_BUCKET }}/${S3_PATH}/${TARBALL_NAME}.asc"
          echo "✓ Signature uploaded"

          echo "✅ Published to s3://${{ env.S3_BUCKET }}/${S3_PATH}/"

      - name: Cleanup
        timeout-minutes: 120
        if: always()
        run: |
          TARBALL_NAME="slurm-${{ matrix.slurm_version }}-${{ matrix.toolchain }}-${{ matrix.architecture }}-software.tar.gz"
          STAGING_KEY="github-actions-artifacts/${{ github.run_id }}/${{ github.run_attempt }}/slurm-tarball-${{ matrix.slurm_version }}-${{ matrix.toolchain }}-${{ matrix.architecture }}/${TARBALL_NAME}"
          aws s3 rm "s3://${{ env.S3_BUCKET }}/${STAGING_KEY}" || true
          rm -rf /tmp/slurm-publish

  # ── Summary ──────────────────────────────────────────────────────────
  summary:
    needs: [prepare-matrix, build-slurm, test-slurm, publish-slurm]
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    if: always()
    steps:
      - name: Build Summary
        timeout-minutes: 120
        run: |
          echo "## Overall Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All Slurm dependency buildcaches have been built and published." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Slurm Versions:** ${{ inputs.slurm_versions }}" >> $GITHUB_STEP_SUMMARY
          echo "**Toolchains:** ${{ inputs.toolchains }}" >> $GITHUB_STEP_SUMMARY
          echo "**Architectures:** ${{ inputs.architectures }}" >> $GITHUB_STEP_SUMMARY
          echo "**Use Slurm Buildcache:** ${{ inputs.use_slurm_buildcache }}" >> $GITHUB_STEP_SUMMARY
          echo "**Use Deps Buildcache:** ${{ inputs.use_deps_buildcache }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**S3 Bucket:** \`s3://${{ env.S3_BUCKET }}/slurm/\`" >> $GITHUB_STEP_SUMMARY
          echo "**CloudFront URL:** ${{ env.CLOUDFRONT_URL }}/slurm/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "1. **Build** — Compiled Slurm + pushed spack buildcache" >> $GITHUB_STEP_SUMMARY
          echo "2. **Test** — Validated tarball (module load + sinfo)" >> $GITHUB_STEP_SUMMARY
          echo "3. **Publish** — GPG-signed + uploaded tarball to S3" >> $GITHUB_STEP_SUMMARY
