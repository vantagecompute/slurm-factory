name: default
config:
  cloud-init.user-data: |
    #cloud-config
    package_update: true
    package_upgrade: true
    
    packages:
      # Essential build system and version control
      - git
      - build-essential
      - python3
      - unzip
      - gfortran
      
      # Core build tools (needed by Spack build process)
      - autoconf
      - automake
      - libtool
      - bison
      - flex
      - cmake
      - make
      - m4
      - pkg-config
      
      # System utilities (used by Spack/autotools)
      - findutils
      - diffutils
      - tar
      - gawk
      - gettext
      
      # Module system
      - lmod
      
      # System libraries used as externals by Spack (not built, just linked)
      # These reduce build time while maintaining functionality
      - libbz2-dev           # bzip2 external
      - liblzma-dev          # xz external
      - libzstd-dev          # zstd external
      - libdbus-1-dev        # dbus external
      - libpam0g-dev         # linux-pam external
      - libyaml-dev          # libyaml external
      - libglib2.0-dev       # glib external
      - libxml2-dev          # libxml2 external
      - libevent-dev         # libevent external
      - libgdbm-dev          # gdbm external
      - libdb-dev            # berkeley-db external
      - libjansson-dev       # jansson external
      - libgcrypt20-dev      # libgcrypt external
      - libgpg-error-dev     # libgpg-error external
      - libsigsegv-dev       # libsigsegv external
      - libhdf5-dev          # hdf5 external
      
      # Note: Runtime dependencies (munge, json-c, curl, openssl, readline, ncurses, lz4, zlib, hwloc, numactl)
      # are built by Spack to ensure consistent versions and proper linking with Slurm.
    
    write_files:
      - path: /etc/profile.d/spack.sh
        permissions: '0644'
        owner: root:root
        content: |
          # Spack system-wide environment
          if [ -f /opt/spack/share/spack/setup-env.sh ]; then
            . /opt/spack/share/spack/setup-env.sh
          fi
    
    runcmd:
      # Create symlinks for multiarch library compatibility (needed for autotools detection)
      - |
        # Fix common library detection issues in Ubuntu multiarch layout
        cd /usr/lib/x86_64-linux-gnu
        for lib in libevent libevent_core libglib-2.0 libbz2 liblzma libzstd libxml2 \
                   libgdbm libdb libjansson libgcrypt libgpg-error libsigsegv; do
          for ext in so so.* a; do
            if [ -f "${lib}.${ext}" ] && [ ! -f "/usr/lib/${lib}.${ext}" ]; then
              ln -sf "/usr/lib/x86_64-linux-gnu/${lib}.${ext}" "/usr/lib/${lib}.${ext}" || true
            fi
          done
        done
      # Install Spack v1.0.0 into /opt/spack (idempotent)
      - |
        bash -lc '
          set -euo pipefail
          if [ ! -d /opt/spack ]; then
            git clone --branch v1.0.0 https://github.com/spack/spack.git /opt/spack
            chown -R root:root /opt/spack
            chmod -R a+rX /opt/spack
          fi
        '

devices:
  eth0:
    name: eth0
    network: lxdbr0
    type: nic
  root:
    path: /
    pool: default
    type: disk
  slurm-factory-cache:
    path: /opt/slurm-factory-cache
    source: CACHE_SOURCE_PLACEHOLDER
    shift: true
    type: disk
